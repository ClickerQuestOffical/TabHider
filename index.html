<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tab Cloak</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 380px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover { background: #2563eb; }
        .status {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="box">
    <h2 style="margin:0">Tab Disguiser</h2>
    <p style="color:#94a3b8; font-size: 0.9rem">Enter a site to copy its identity</p>
    
    <input type="text" id="urlInput" placeholder="e.g. youtube.com" autocomplete="off">
    <button id="btn" onclick="applyCloak()">Apply Disguise</button>
    
    <div id="status" class="status">Waiting for input...</div>
</div>

<script>
    async function applyCloak() {
        const input = document.getElementById('urlInput').value.trim();
        const status = document.getElementById('status');
        const btn = document.getElementById('btn');
        
        if (!input) return;

        // 1. Clean up the URL
        let url = input.replace(/^(https?:\/\/)?/, 'https://');
        let domain = "";
        try {
            domain = new URL(url).hostname.replace('www.', '');
        } catch(e) {
            status.textContent = "Invalid URL format.";
            return;
        }

        btn.disabled = true;
        status.textContent = "Fetching identity...";

        // 2. APPLY ICON IMMEDIATELY (This almost always works)
        let link = document.querySelector("link[rel*='icon']");
        if (!link) {
            link = document.createElement('link');
            link.rel = 'icon';
            document.head.appendChild(link);
        }
        link.href = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;

        // 3. FETCH TITLE (With Fallback)
        let finalTitle = "";

        try {
            // Try Proxy 1 (corsproxy.io)
            const response = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
            const html = await response.text();
            
            const doc = new DOMParser().parseFromString(html, 'text/html');
            finalTitle = doc.querySelector('title')?.innerText;
            
        } catch (err) {
            console.log("Proxy 1 failed, trying Fallback...");
        }

        // 4. SMART FALLBACK LOGIC
        // If Proxy failed or returned empty, we "guess" the title from the domain
        if (!finalTitle || finalTitle.length < 2) {
            // Takes "youtube.com" -> "Youtube"
            finalTitle = domain.split('.')[0];
            finalTitle = finalTitle.charAt(0).toUpperCase() + finalTitle.slice(1);
            status.textContent = "Security blocked title fetch. Using smart-guess.";
        } else {
            status.textContent = "Successfully copied identity!";
        }

        document.title = finalTitle;
        btn.disabled = false;
    }
</script>

</body>
</html>
